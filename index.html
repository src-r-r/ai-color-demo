<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Color Demo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>AI Color Demo</h1>
    <p>Generate data &rarr; Train a model &rarr; Run inference &mdash; entirely in your browser.</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="generate" role="tab">1. Generate Data</button>
    <button class="tab-btn" data-tab="train" role="tab">2. Train Model</button>
    <button class="tab-btn" data-tab="inference" role="tab">3. Inference</button>
  </nav>

  <main>
    <!-- DATA GENERATION TAB -->
    <section id="generate" class="tab-panel active">
      <div class="controls">
        <div class="control-row">
          <label for="rows">Rows</label>
          <input type="number" id="rows" value="64" min="8" max="256">
          <label for="cols">Cols</label>
          <input type="number" id="cols" value="32" min="4" max="128">
        </div>
        <div class="control-row">
          <button id="randomize-btn">Randomize Weights</button>
          <button id="generate-btn">Generate Board</button>
        </div>
      </div>

      <fieldset class="weights-panel">
        <legend>Color Weights</legend>
        <div class="weight-sliders" id="weight-sliders"></div>
      </fieldset>

      <div id="board-container" class="board-container" aria-label="Generated color board"></div>
      <p id="board-info" class="info-text"></p>
    </section>

    <!-- TRAINING TAB -->
    <section id="train" class="tab-panel">
      <div class="controls">
        <div class="control-row">
          <label for="context-length">Context Length</label>
          <input type="number" id="context-length" value="8" min="2" max="32">
          <label for="epochs">Epochs</label>
          <input type="number" id="epochs" value="20" min="1" max="200">
          <label for="learning-rate">Learning Rate</label>
          <input type="number" id="learning-rate" value="0.01" min="0.0001" max="0.5" step="0.001">
        </div>
        <div class="control-row">
          <button id="train-btn">Train Model</button>
          <button id="stop-btn" disabled>Stop</button>
        </div>
      </div>

      <div class="training-status">
        <div class="metric-cards">
          <div class="metric-card">
            <span class="metric-label">Epoch</span>
            <span id="epoch-display" class="metric-value">—</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Loss</span>
            <span id="loss-display" class="metric-value">—</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Accuracy</span>
            <span id="accuracy-display" class="metric-value">—</span>
          </div>
        </div>
        <div id="progress-container" class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <canvas id="loss-chart" class="loss-chart" aria-label="Training loss chart"></canvas>
      <p id="train-info" class="info-text"></p>
    </section>

    <!-- INFERENCE TAB -->
    <section id="inference" class="tab-panel">
      <div class="controls">
        <div class="control-row">
          <label for="infer-len">Sequence Length</label>
          <input type="number" id="infer-len" value="8" min="1" max="32">
          <button id="random-seq-btn">Random Sequence</button>
          <button id="clear-seq-btn">Clear</button>
        </div>
        <div class="control-row">
          <button id="predict-btn" disabled>Predict Next</button>
          <button id="chain-btn" disabled>Chain Generate</button>
          <label class="chain-label">
            <input type="number" id="chain-count" value="8" min="1" max="64"> steps
          </label>
        </div>
      </div>

      <div class="inference-input">
        <span class="input-label">Input Sequence:</span>
        <div id="input-sequence" class="sequence-display"></div>
      </div>

      <div id="color-picker" class="color-picker">
        <span class="input-label">Click to append:</span>
        <div id="color-buttons" class="color-buttons"></div>
      </div>

      <div id="prediction-result" class="prediction-result">
        <span class="input-label">Prediction:</span>
        <div id="prediction-display" class="prediction-display"></div>
      </div>

      <div id="chain-result" class="chain-result"></div>
      <p id="infer-info" class="info-text"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/model.js"></script>
  <script src="js/inference.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
